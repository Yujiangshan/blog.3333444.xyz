const PER_PAGE = 6;
let currentPage = 1;
const totalPages = Math.ceil(POSTS.length / PER_PAGE);

function renderPage(page) {
  currentPage = page;
  const start = (page - 1) * PER_PAGE;
  const items = POSTS.slice(start, start + PER_PAGE);
  let html = "";
  items.forEach(function(p) {
    const dateFmt = p.date.replace(/-/g, " · ");
    const tags = (p.tags || []).slice(0, 4).map(function(t) {
      return '<span class="tag">' + t.replace("#","") + '</span>';
    }).join("");
    const excerpt = (p.excerpt || "").slice(0, 100) + "...";
    html += '<div class="post-item">'
      + '<div class="post-date">' + dateFmt + '</div>'
      + '<a class="post-link" href="/posts/' + p.slug + '.html">' + p.title + '</a>'
      + '<div class="post-excerpt">' + excerpt + '</div>'
      + '<div class="post-tags">' + tags + '</div>'
      + '</div>';
  });
  html += '<div class="divider">· · ·</div>';
  document.getElementById("posts-container").innerHTML = html;

  // 分页导航
  let nav = "";
  if (totalPages > 1) {
    nav += page > 1
      ? '<a onclick="renderPage(' + (page-1) + ')">← 上一页</a>'
      : '<span class="disabled">← 上一页</span>';
    for (let i = 1; i <= totalPages; i++) {
      nav += i === page
        ? '<span class="current">' + i + '</span>'
        : '<a onclick="renderPage(' + i + ')">' + i + '</a>';
    }
    nav += page < totalPages
      ? '<a onclick="renderPage(' + (page+1) + ')">下一页 →</a>'
      : '<span class="disabled">下一页 →</span>';
  }
  document.getElementById("pagination").innerHTML = nav;
  window.scrollTo(0, 0);
}
renderPage(1);
