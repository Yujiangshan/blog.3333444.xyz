<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于 · 寂照</title>
<style>@font-face {
  font-family: 'JingHua';
  src: url('https://media.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype');
  font-display: swap;
}
@import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf9f7;
  --bg2: #f2f0ec;
  --text: #2c2820;
  --text2: #6b6358;
  --text3: #a09890;
  --border: rgba(44,40,32,0.12);
  --max-w: 720px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1917;
    --bg2: #232220;
    --text: #e8e4dc;
    --text2: #a09890;
    --text3: #6b6358;
    --border: rgba(232,228,220,0.1);
  }
}

html { font-size: 16px; }
body {
  font-family: 'LXGW WenKai', 'PingFang SC', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.9;
  padding: 0 1.5rem;
}

.wrap { max-width: var(--max-w); margin: 0 auto; padding: 3rem 0; }

/* 导航 */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 2rem 0 3rem;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 3rem;
}
.nav-title {
  font-family: 'JingHua', serif;
  font-size: 24px;
  color: var(--text);
  text-decoration: none;
  letter-spacing: 0.2em;
}
.nav-links { display: flex; gap: 1.5rem; }
.nav-links a {
  font-size: 22px;
  color: var(--text3);
  text-decoration: none;
  letter-spacing: 0.05em;
}
.nav-links a:hover { color: var(--text2); }

/* 文章列表 */
.post-item {
  padding: 1.75rem 0;
  border-bottom: 0.5px solid var(--border);
}
.post-item:last-child { border-bottom: none; }
.post-date {
  font-size: 18px;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-bottom: 0.4rem;
}
.post-link {
  font-family: 'JingHua', serif;
  font-size: 20px;
  color: var(--text);
  text-decoration: none;
  line-height: 1.6;
  display: block;
  margin-bottom: 0.5rem;
}
.post-link:hover { color: var(--text2); }
.post-excerpt {
  font-size: 18px;
  color: var(--text2);
  line-height: 1.8;
}
.post-tags { margin-top: 0.6rem; display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 15px;
  color: var(--text3);
  background: var(--bg2);
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 0.03em;
}

/* 文章页 */
.article-header { text-align: center; padding: 2rem 0 2.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 2.5rem; }
.article-title {
  font-family: 'JingHua', serif;
  font-size: 24px;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 1rem;
}
.article-meta {
  font-size: 15px;
  color: var(--text3);
  letter-spacing: 0.08em;
}
.cover-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  border-radius: 2px;
  margin-bottom: 2.5rem;
  opacity: 0.92;
}
.article-body { font-size: 18px; line-height: 1.95; }
.article-body h2 {
  font-family: 'JingHua', serif;
  font-size: 24px;
  font-weight: 400;
  color: var(--text2);
  margin: 2rem 0 1rem;
  letter-spacing: 0.05em;
}
.article-body p { margin-bottom: 1.3rem; }
.article-body blockquote {
  border-left: 2px solid var(--border);
  padding-left: 1rem;
  color: var(--text2);
  margin: 1.5rem 0;
}

/* 英文区块 */
.en-section {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 0.5px solid var(--border);
  font-family: Georgia, serif;
  color: var(--text2);
}
.en-section h2 {
  font-size: 24px;
  font-weight: 400;
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
  color: var(--text3);
}
.en-section p { font-size: 18px; line-height: 1.9; margin-bottom: 1rem; }

/* 页脚 */
.article-footer {
  text-align: center;
  padding: 3rem 0 2rem;
  font-size: 15px;
  color: var(--text3);
  letter-spacing: 0.2em;
}
.back-link {
  display: inline-block;
  margin-top: 2rem;
  font-size: 15px;
  color: var(--text3);
  text-decoration: none;
  letter-spacing: 0.05em;
}
.back-link:hover { color: var(--text2); }

/* 分隔 */
.divider {
  text-align: center;
  color: var(--text3);
  font-size: 14px;
  padding: 2rem 0 1rem;
  letter-spacing: 0.3em;
}

/* 评论区 */
.comments {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 0.5px solid var(--border);
}

/* 分享栏 */
.share-bar {
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 0.5px solid var(--border);
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
.share-link {
  font-size: 12px;
  color: var(--text3);
  text-decoration: none;
  padding: 4px 12px;
  border: 0.5px solid var(--border);
  border-radius: 2px;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}
.share-link:hover { color: var(--text2); }
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
  <a href="/" class="nav-title">寂照</a>
  <div class="nav-links">
    <a href="/">文章</a>
    <a href="/about.html">关于</a>
  </div>
</nav>
  <article>
    <header class="article-header">
      <h1 class="article-title">关于寂照</h1>
    </header>
    <div class="article-body">
      <p>寂照，取自永嘉证道歌「寂寂惺惺」，寂而常照，照而常寂。</p>
      <p>这里记录修行路上的感悟与思考，以文字为道场，以日常为修行。</p>
      <p>内容涉及禅宗、净土、般若、心中心法等佛法义理，以及在尘世中应用修行见地的探索。</p>
    </div>
  </article>
  <a href="/" class="back-link">← 返回列表</a>
</div>
</body>
</html>
