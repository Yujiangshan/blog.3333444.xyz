<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问答 · 寂照</title>
    <style>
        @font-face {
            font-family: 'JingHua';
            src: url('https://media.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg: #faf9f7; --bg2: #f2f0ec; --bg3: #e8e5df;
            --text: #2c2820; --text2: #6b6358; --text3: #a09890;
            --border: rgba(44, 40, 32, 0.12); --accent: #8b7355;
            --max-w: 720px; --base-fz: 16px; --nav-fz: 22px;
            --msg-fz: 16px; --input-fz: 16px;
        }

        body.mode-big {
            --text: #1a1712; --text2: #3d3932; --text3: #70685e;
            --border: rgba(44, 40, 32, 0.25); --accent: #7a6143;
            --max-w: 800px; --base-fz: 20px; --nav-fz: 26px;
            --msg-fz: 20px; --input-fz: 18px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1917; --bg2: #232220; --bg3: #2d2c28;
                --text: #e8e4dc; --text2: #a09890; --text3: #6b6358;
                --border: rgba(232, 228, 220, 0.1); --accent: #c4a878;
            }
        }

        /* 基础重置 */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            /* 强制所有元素在必要时换行 */
            overflow-wrap: break-word; 
            word-wrap: break-word;
            word-break: break-word;
        }
        
        body {
            font-family: 'LXGW WenKai', 'PingFang SC', sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.8;
            min-height: 100vh; 
            display: flex; flex-direction: column;
            font-size: var(--base-fz);
            /* 防止 body 出现横向滚动条 */
            overflow-x: hidden;
            width: 100vw;
        }

        /* 导航优化 */
        .nav {
            width: 100%;
            max-width: var(--max-w);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 0.5px solid var(--border);
            flex-shrink: 0;
        }

        .nav-title {
            font-family: 'JingHua', serif; font-size: var(--nav-fz);
            color: var(--text); text-decoration: none; 
            white-space: nowrap; /* 标题不换行 */
            margin-right: 10px;
        }

        .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            min-width: 0; /* 允许收缩 */
        }

        .btn-toggle {
            background: var(--bg3); border: 1px solid var(--border);
            color: var(--text); padding: 0.4rem 0.6rem; border-radius: 6px;
            font-size: 14px; cursor: pointer; white-space: nowrap;
        }
        body.mode-big .btn-toggle { font-size: 16px; font-weight: bold; background: var(--accent); color: #fff; }

        .nav-links { display: flex; gap: 0.8rem; }
        .nav-links a {
            font-size: calc(var(--base-fz) - 1px); color: var(--text2);
            text-decoration: none; white-space: nowrap;
        }
        .nav-links a.active { color: var(--accent); font-weight: bold; }

        /* 主体 */
        .main {
            width: 100%;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; /* 关键：允许 flex 子项收缩 */
        }

        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 1rem 0; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .msg { margin-bottom: 1.5rem; width: 100%; display: flex; flex-direction: column; }
        .msg-user { align-items: flex-end; }
        .msg-ai { align-items: flex-start; }

        .bubble {
            padding: 1rem; 
            border-radius: 18px; 
            /* 关键修复：确保气泡永远不会撑破屏幕 */
            max-width: calc(100% - 10px); 
            font-size: var(--msg-fz);
            position: relative;
        }

        .msg-user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg-ai .bubble { 
            background: var(--bg2); 
            border: 0.5px solid var(--border); 
            border-bottom-left-radius: 4px; 
            width: auto;
        }

        /* 修正 Markdown 里的代码块或长文本溢出 */
        .bubble pre, .bubble code { white-space: pre-wrap; word-break: break-all; }
        .bubble blockquote { border-left: 4px solid var(--accent); padding: 0.5rem 0.8rem; margin: 1rem 0; background: var(--bg); }

        /* 输入区修复 */
        .input-area {
            width: 100%;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0.8rem 1rem calc(0.8rem + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        .input-row { 
            display: flex; 
            gap: 0.6rem; 
            align-items: flex-end; 
            width: 100%;
        }
        
        textarea {
            flex: 1; 
            min-width: 0; /* 允许 textarea 在 flex 容器中缩小 */
            font-family: inherit; 
            font-size: var(--input-fz);
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.8rem; 
            min-height: 48px; max-height: 200px;
            outline: none; color: var(--text);
        }

        .btn-send {
            background: var(--accent); color: #fff; border: none;
            height: 48px; padding: 0 1.2rem; border-radius: 10px;
            font-weight: bold; cursor: pointer; white-space: nowrap;
            flex-shrink: 0; /* 禁止按钮缩小 */
        }

        .examples { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; padding: 1.5rem 0; }
        .examples button {
            background: var(--bg2); border: 1px solid var(--border);
            padding: 0.5rem 0.8rem; border-radius: 20px;
            font-family: inherit; font-size: 14px; cursor: pointer; color: var(--text2);
        }

        @media (max-width: 400px) {
            .nav { padding: 0.8rem 0.5rem; }
            .nav-links { display: none; } /* 超小屏幕隐藏链接文字，保住大字版布局 */
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="/" class="nav-title">寂照</a>
        <div class="nav-right">
            <button class="btn-toggle" onclick="toggleMode()" id="modeBtn">大字版</button>
            <div class="nav-links">
                <a href="/">文章</a>
                <a href="/chat.html" class="active">问答</a>
            </div>
        </div>
    </nav>

    <div class="main">
        <div id="welcome">
            <div style="text-align:center; padding: 2rem 0 1rem;">
                <div style="font-family:'JingHua', serif; font-size: 32px; color:var(--accent); margin-bottom:10px;">问 道</div>
                <p style="color:var(--text3); font-size: 0.9rem;">基于佛法经典与大德开示的智能问答</p>
            </div>
            <div class="examples">
                <button onclick="askExample(this)">什么是空性</button>
                <button onclick="askExample(this)">心乱时怎么摄心</button>
                <button onclick="askExample(this)">放不下怎么办</button>
            </div>
        </div>
        <div id="messages" class="messages"></div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <textarea id="input" placeholder="输入您的问题..." rows="1"></textarea>
            <button class="btn-send" onclick="send()">提问</button>
        </div>
    </div>

    <script async src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" onload="markedReady=true; marked.setOptions({ breaks: true, gfm: true });"></script>

    <script>
        let markedReady = false;
        const API_URL = "https://api.3333444.xyz";
        const LOADING_MSGS = ["正在查询佛法经典", "正在匹配大德开示", "正在比对注疏义理", "正在准备文本", "如如不动，稍候片刻"];

        function toggleMode() {
            const isBig = document.body.classList.toggle('mode-big');
            localStorage.setItem('jz-big-mode', isBig);
            document.getElementById('modeBtn').textContent = isBig ? "标准字" : "大字版";
        }

        (function initMode() {
            const savedMode = localStorage.getItem('jz-big-mode') === 'true';
            if (savedMode) document.body.classList.add('mode-big');
            document.getElementById('modeBtn').textContent = savedMode ? "标准字" : "大字版";
        })();

        function renderMarkdown(text) {
            if (markedReady && typeof marked !== "undefined") return marked.parse(text);
            return text.replace(/\n/g, "<br>");
        }

        function askExample(btn) {
            document.getElementById("input").value = btn.textContent;
            send();
        }

        function addMsg(role, html) {
            document.getElementById("welcome").style.display = "none";
            const box = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "msg msg-" + role;
            div.innerHTML = '<div class="bubble">' + html + '</div>';
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        async function send() {
            const inp = document.getElementById("input");
            const q = inp.value.trim();
            if (!q) return;

            inp.value = "";
            inp.style.height = "auto";
            addMsg("user", q);

            const aiDiv = addMsg("ai", "");
            const bubble = aiDiv.querySelector(".bubble");
            
            let msgIdx = 0;
            let dotCount = 0;
            const dotTimer = setInterval(() => {
                dotCount = (dotCount + 1) % 5;
                bubble.innerText = LOADING_MSGS[msgIdx] + ".".repeat(dotCount);
            }, 500);

            const msgTimer = setInterval(() => {
                if (msgIdx < LOADING_MSGS.length - 1) msgIdx++;
                else clearInterval(msgTimer);
            }, 3000);

            try {
                const resp = await fetch(API_URL + "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: q }),
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let full = "";
                let hasStarted = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const text = decoder.decode(value);
                    const lines = text.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const payload = line.slice(6).trim();
                            if (payload === "[DONE]") continue;
                            try {
                                const obj = JSON.parse(payload);
                                const content = obj.choices?.[0]?.delta?.content;
                                if (content) {
                                    if (!hasStarted) {
                                        clearInterval(dotTimer);
                                        clearInterval(msgTimer);
                                        bubble.innerHTML = "";
                                        hasStarted = true;
                                    }
                                    full += content;
                                    bubble.innerHTML = renderMarkdown(full);
                                    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch (err) {
                clearInterval(dotTimer);
                clearInterval(msgTimer);
                bubble.innerHTML = "连接失败，请检查网络。";
            }
        }

        const tx = document.getElementById("input");
        tx.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        });
        tx.addEventListener("keydown", e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
    </script>
</body>
</html>
