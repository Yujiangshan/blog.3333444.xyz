<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问答 · 寂照</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <style>
        @font-face {
            font-family: 'JingHua';
            src: url('https://media.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype');
            font-display: swap;
        }
        @import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css');

        :root {
            --bg: #faf9f7; --bg2: #f2f0ec; --bg3: #e8e5df;
            --text: #2c2820; --text2: #6b6358; --text3: #a09890;
            --border: rgba(44,40,32,0.12); --accent: #8b7355;
            --max-w: 720px; --base-fz: 16px; --nav-fz: 22px;
            --msg-fz: 16px; --input-fz: 16px;
        }
        body.mode-big {
            --text: #1a1712; --text2: #3d3932; --text3: #70685e;
            --border: rgba(44,40,32,0.25); --accent: #7a6143;
            --max-w: 800px; --base-fz: 20px; --nav-fz: 26px;
            --msg-fz: 20px; --input-fz: 18px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1917; --bg2: #232220; --bg3: #2d2c28;
                --text: #e8e4dc; --text2: #a09890; --text3: #6b6358;
                --border: rgba(232,228,220,0.1); --accent: #c4a878;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'LXGW WenKai', 'PingFang SC', sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.8;
            display: flex; flex-direction: column;
            font-size: var(--base-fz);
            overflow-x: hidden;
        }

        /* ── 导航 ── */
        .nav {
            width: 100%; max-width: var(--max-w);
            margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.9rem 1rem;
            border-bottom: 0.5px solid var(--border);
            flex-shrink: 0;
        }
        .nav-title {
            font-family: 'JingHua', serif; font-size: var(--nav-fz);
            color: var(--text); text-decoration: none;
            white-space: nowrap; margin-right: 10px;
            letter-spacing: 0.08em;
        }
        .nav-right { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
        .btn-toggle {
            background: var(--bg3); border: 1px solid var(--border);
            color: var(--text2); padding: 0.35rem 0.65rem; border-radius: 6px;
            font-size: 13px; cursor: pointer; white-space: nowrap;
            font-family: inherit; transition: all 0.2s;
        }
        body.mode-big .btn-toggle {
            font-size: 15px; font-weight: bold;
            background: var(--accent); color: #fff; border-color: transparent;
        }
        .nav-links { display: flex; gap: 0.8rem; }
        .nav-links a {
            font-size: calc(var(--base-fz) - 2px); color: var(--text3);
            text-decoration: none; white-space: nowrap;
        }
        .nav-links a.active { color: var(--accent); }

        /* ── 主体容器 ── */
        .main {
            width: 100%; max-width: var(--max-w);
            margin: 0 auto;
            flex: 1;
            display: flex; flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* ── 欢迎区 ── */
        #welcome {
            padding: 2rem 1rem 0.5rem;
            flex-shrink: 0;
        }
        .welcome-title {
            text-align: center;
            font-family: 'JingHua', serif; font-size: 30px;
            color: var(--accent); margin-bottom: 6px;
            letter-spacing: 0.15em;
        }
        .welcome-sub {
            text-align: center;
            color: var(--text3); font-size: 0.88rem; margin-bottom: 1.2rem;
        }
        .examples {
            display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;
            padding-bottom: 0.5rem;
        }
        .examples button {
            background: var(--bg2); border: 1px solid var(--border);
            padding: 0.45rem 0.9rem; border-radius: 20px;
            font-family: inherit; font-size: 14px; cursor: pointer;
            color: var(--text2); transition: all 0.15s;
        }
        .examples button:hover { background: var(--bg3); color: var(--text); }

        /* ── 消息区 ── */
        .messages {
            flex: 1;
            overflow-y: auto; overflow-x: hidden;
            padding: 1rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .msg {
            margin-bottom: 1.2rem;
            width: 100%;
            display: flex; flex-direction: column;
        }
        .msg-user { align-items: flex-end; }
        .msg-ai   { align-items: flex-start; }

        /* ── 气泡 ── */
        .bubble {
            padding: 0.85rem 1rem;
            border-radius: 18px;
            max-width: min(88%, 560px);
            min-width: 0;
            font-size: var(--msg-fz);
            position: relative;
            overflow-wrap: break-word;
            word-break: break-word;
            overflow: hidden;
        }
        .msg-user .bubble {
            background: var(--accent); color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-ai .bubble {
            background: var(--bg2); border: 0.5px solid var(--border);
            border-bottom-left-radius: 4px;
            width: auto; max-width: min(92%, 600px);
        }

        /* ── Markdown 内容修复 ── */
        .bubble p { margin: 0.4em 0; }
        .bubble p:first-child { margin-top: 0; }
        .bubble p:last-child  { margin-bottom: 0; }

        .bubble ol,
        .bubble ul {
            padding-left: 1.6em;
            margin: 0.5em 0;
            list-style-position: outside;
        }
        .bubble li {
            margin: 0.25em 0;
            overflow-wrap: break-word;
            word-break: break-word;
            min-width: 0;
        }
        .bubble ol ol, .bubble ul ul,
        .bubble ol ul, .bubble ul ol {
            padding-left: 1.2em;
            margin: 0.2em 0;
        }

        .bubble pre {
            background: var(--bg3);
            border-radius: 8px;
            padding: 0.8em;
            margin: 0.6em 0;
            overflow-x: auto;
            font-size: 0.85em;
        }
        .bubble code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.88em;
        }
        .bubble p code {
            background: var(--bg3);
            padding: 0.1em 0.35em;
            border-radius: 4px;
        }

        .bubble blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.4rem 0.8rem;
            margin: 0.8rem 0;
            background: var(--bg);
            border-radius: 0 6px 6px 0;
            color: var(--text2);
            font-style: italic;
        }

        .bubble hr {
            border: none;
            border-top: 0.5px solid var(--border);
            margin: 0.8em 0;
        }

        .bubble h1, .bubble h2, .bubble h3 {
            font-family: 'JingHua', serif;
            font-weight: normal;
            margin: 0.8em 0 0.3em;
            color: var(--text);
        }
        .bubble h2 { font-size: 1.1em; }
        .bubble h3 { font-size: 1em; color: var(--text2); }

        .bubble strong { color: var(--accent); font-weight: 600; }

        .bubble.streaming::after {
            content: "▋";
            display: inline-block;
            color: var(--accent);
            animation: blink 0.7s step-end infinite;
            margin-left: 2px;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── 话题标签样式 ── */
        .topic-tags {
            display: flex; flex-wrap: wrap; gap: 6px;
            margin-top: 10px; padding-top: 8px;
            border-top: 0.5px solid var(--border);
        }
        .topic-tags .topic-tag {
            display: inline-block;
            padding: 2px 10px; border-radius: 6px;
            font-size: 12px; letter-spacing: 0.05em;
            background: var(--bg3); border: 1px solid var(--border);
            color: var(--accent); cursor: default;
            animation: slideUp 0.4s ease-out forwards;
        }

        /* ── 输入区 ── */
        .input-area {
            width: 100%; max-width: var(--max-w);
            margin: 0 auto;
            padding: 0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom));
            border-top: 0.5px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
            z-index: 100;
        }
        .input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
        textarea {
            flex: 1; min-width: 0;
            font-family: inherit; font-size: var(--input-fz);
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.5rem 0.8rem;
            min-height: 40px; max-height: 180px;
            outline: none; color: var(--text);
            resize: none; line-height: 1.5;
            transition: border-color 0.15s;
        }
        textarea:focus { border-color: var(--accent); }
        .btn-send {
            background: var(--accent); color: #fff; border: none;
            height: 40px; padding: 0 1rem; border-radius: 10px;
            font-weight: bold; cursor: pointer; white-space: nowrap;
            flex-shrink: 0; font-size: 15px; font-family: inherit;
            transition: opacity 0.15s;
        }
        .btn-send:active { opacity: 0.8; }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── 余额显示 ── */
        .quota-status {
            font-size: 11px; color: var(--text3);
            text-align: right; margin-top: 4px;
            padding-right: 4px; opacity: 0.7;
        }

        /* ── 建议词条样式 ── */
        .suggestions-bar {
            display: flex; gap: 0.5rem;
            padding: 0.6rem 1rem;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            background: linear-gradient(to top, var(--bg), transparent);
        }
        .suggestions-bar::-webkit-scrollbar { display: none; }
        .suggestions-bar .term-tag {
            background: var(--bg2); border: 1px solid var(--border);
            padding: 0.35rem 0.8rem; border-radius: 20px;
            font-size: 13px; color: var(--text2);
            cursor: pointer; transition: all 0.2s;
            animation: slideUp 0.4s ease-out forwards;
        }
        .suggestions-bar .term-tag:hover { background: var(--bg3); color: var(--accent); border-color: var(--accent); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── RAG 元数据样式 ── */
        .graph-container {
            margin: 0.8rem 1rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg3);
            position: relative;
        }
        .graph-container img {
            width: 100%; display: block;
            cursor: zoom-in;
        }

        /* ── 超小屏幕 ── */
        @media (max-width: 380px) {
            .nav { padding: 0.7rem 0.6rem; }
            .nav-links { display: none; }
            .bubble { max-width: 95%; }
            .msg-ai .bubble { max-width: 97%; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-title">寂照</a>
        <div class="nav-right">
            <button class="btn-toggle" onclick="toggleMode()" id="modeBtn">大字版</button>
            <div class="nav-links">
                <a href="/">文章</a>
                <a href="/chat.html" class="active">问答</a>
            </div>
        </div>
    </nav>

    <div class="main">
        <div id="welcome">
            <p class="welcome-title">问 道</p>
            <p class="welcome-sub">基于佛法经典与大德开示的智能问答</p>
            <div class="examples">
                <button onclick="askExample(this)">什么是空性</button>
                <button onclick="askExample(this)">心乱时怎么摄心</button>
                <button onclick="askExample(this)">放不下怎么办</button>
                <button onclick="askExample(this)">如何观照自心</button>
            </div>
        </div>
        <div id="messages" class="messages"></div>
        <div id="suggestions" class="suggestions-bar" style="display:none"></div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <textarea id="input" placeholder="输入您的问题…" rows="1"></textarea>
            <button class="btn-send" id="sendBtn" onclick="send()">提问</button>
        </div>
        <div id="quotaInfo" class="quota-status"></div>
    </div>

    <script async src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
        onload="markedReady=true; marked.setOptions({ breaks:true, gfm:true });"></script>
    <script>
        let markedReady = false;
        let isSending   = false;
        const API_URL   = "https://api.3333444.xyz";
        const LOADING_MSGS = [
            "正在查询佛法经典",
            "正在匹配大德开示",
            "正在比对注疏义理",
            "正在准备文本",
            "如如不动，稍候片刻"
        ];

        /* ── 大字模式 ── */
        function toggleMode() {
            const isBig = document.body.classList.toggle('mode-big');
            localStorage.setItem('jz-big-mode', isBig);
            document.getElementById('modeBtn').textContent = isBig ? "标准字" : "大字版";
        }
        (function initMode() {
            const saved = localStorage.getItem('jz-big-mode') === 'true';
            if (saved) document.body.classList.add('mode-big');
            document.getElementById('modeBtn').textContent = saved ? "标准字" : "大字版";
        })();

        /* ── Markdown 渲染 ── */
        function renderMarkdown(text) {
            if (markedReady && typeof marked !== "undefined") {
                return marked.parse(text);
            }
            return text.replace(/\n/g, "<br>");
        }

        /* ── 示例问题 ── */
        function askExample(btn) {
            document.getElementById("input").value = btn.textContent;
            send();
        }

        /* ── 添加消息气泡 ── */
        function addMsg(role, html, streaming = false) {
            document.getElementById("welcome").style.display = "none";
            const box = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "msg msg-" + role;
            const bubble = document.createElement("div");
            bubble.className = "bubble" + (streaming ? " streaming" : "");
            bubble.innerHTML = html;
            div.appendChild(bubble);
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return bubble;
        }

        /* ── 发送 ── */
        async function send() {
            if (isSending) return;
            const inp = document.getElementById("input");
            const sendBtn = document.getElementById("sendBtn");
            const quotaInfo = document.getElementById("quotaInfo");
            const q = inp.value.trim();
            if (!q) return;

            isSending = true;
            sendBtn.disabled = true;
            inp.value = "";
            inp.style.height = "auto";

            addMsg("user", q.replace(/</g, "&lt;").replace(/>/g, "&gt;"));

            const bubble = addMsg("ai", "", true);
            let msgIdx = 0, dotCount = 0;
            bubble.innerText = LOADING_MSGS[0] + "…";

            const dotTimer = setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                bubble.innerText = LOADING_MSGS[msgIdx] + "…".repeat(dotCount + 1);
            }, 400);
            const msgTimer = setInterval(() => {
                if (msgIdx < LOADING_MSGS.length - 1) {
                    msgIdx++;
                    bubble.innerText = LOADING_MSGS[msgIdx] + "…";
                }
            }, 3000);

            const msgBox = document.getElementById("messages");

            try {
                const resp = await fetch(API_URL + "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: q }),
                });

                const remaining = resp.headers.get("X-Remaining");
                if (remaining !== null) {
                    quotaInfo.innerText = `今日余愿：${remaining} 次`;
                }

                if (!resp.ok) {
                    const errObj = await resp.json().catch(() => ({}));
                    throw new Error(errObj.error || "提问失败，请稍后重试");
                }

                const reader  = resp.body.getReader();
                const decoder = new TextDecoder();
                let full = "", hasStarted = false;
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || trimmed === ": heartbeat") continue;
                        if (!trimmed.startsWith("data: ")) continue;

                        const payload = trimmed.slice(6).trim();
                        if (payload === "[DONE]") continue;

                        try {
                            const obj = JSON.parse(payload);

                            // 1. 处理元数据 (图谱)
                            if (obj.meta?.graph_url) {
                                const container = document.createElement("div");
                                container.className = "graph-container";
                                container.innerHTML = `<img src="${obj.meta.graph_url}" alt="义理关系图" onclick="window.open(this.src)">`;
                                bubble.parentNode.insertBefore(container, bubble);
                                msgBox.scrollTop = msgBox.scrollHeight;
                                continue;
                            }

                            // 2. 处理元数据 (建议词 + 话题标签，同一帧里一起处理)
                            if (obj.meta) {
                                if (obj.meta.suggested_terms) {
                                    renderSuggestions(obj.meta.suggested_terms);
                                }
                                if (obj.meta.topics) {
                                    renderTopics(obj.meta.topics, bubble);
                                }
                                continue;
                            }

                            // 3. 处理流式正文
                            const content = obj.choices?.[0]?.delta?.content;
                            if (content) {
                                if (!hasStarted) {
                                    clearInterval(dotTimer);
                                    clearInterval(msgTimer);
                                    bubble.innerHTML = "";
                                    hasStarted = true;
                                }
                                full += content;
                                bubble.innerHTML = renderMarkdown(full);
                                msgBox.scrollTop = msgBox.scrollHeight;
                            }
                        } catch(e) {
                            console.error("解析流数据出错:", e);
                        }
                    }
                }
                bubble.classList.remove("streaming");

            } catch (err) {
                clearInterval(dotTimer);
                clearInterval(msgTimer);
                bubble.classList.remove("streaming");
                bubble.innerHTML = "连接失败：" + err.message;
            } finally {
                isSending = false;
                sendBtn.disabled = false;
            }
        }

        /* ── 渲染建议词 ── */
        function renderSuggestions(terms) {
            const container = document.getElementById("suggestions");
            if (!terms || terms.length === 0) {
                container.style.display = "none";
                return;
            }
            container.style.display = "flex";
            container.innerHTML = "";
            const prefixes = ['什么是', '如何理解', '请详述', '何为'];

            terms.forEach((term, i) => {
                const pfx = prefixes[i % prefixes.length];
                const fullText = `${pfx}「${term}」？`;
                const span = document.createElement("span");
                span.className = "term-tag";
                span.innerText = fullText;
                span.style.animationDelay = (i * 100) + "ms";
                span.onclick = () => {
                    document.getElementById("input").value = fullText;
                    send();
                };
                container.appendChild(span);
            });
            const msgBox = document.getElementById("messages");
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        /* ── 渲染话题标签 ── */
        function renderTopics(topics, bubble) {
            if (!topics || topics.length === 0) return;
            if (bubble.querySelector('.topic-tags')) return; // 防止重复添加
            const bar = document.createElement('div');
            bar.className = 'topic-tags';
            topics.forEach((tag, i) => {
                const span = document.createElement('span');
                span.className = 'topic-tag';
                span.style.animationDelay = (i * 80) + "ms";
                span.textContent = '# ' + tag;
                bar.appendChild(span);
            });
            bubble.appendChild(bar);
            const msgBox = document.getElementById("messages");
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        /* ── textarea 自动伸缩 ── */
        const tx = document.getElementById("input");

        // 初始获取余额
        (async function initQuota() {
            try {
                const resp = await fetch(API_URL + "/quota");
                const data = await resp.json();
                if (data.remaining !== undefined) {
                    document.getElementById("quotaInfo").innerText = `今日余愿：${data.remaining} 次`;
                }
            } catch(e) {}
        })();

        tx.addEventListener("input", function () {
            document.getElementById("suggestions").style.display = this.value.trim() ? "none" : "flex";
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 180) + "px";
        });
        tx.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
    </script>
</body>
</html>
