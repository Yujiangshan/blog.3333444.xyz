<!DOCTYPE html>

<html lang="zh-Hans">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问答 · 寂照</title>
    <meta name="description" content="寂照 — 佛法修行问答，基于佛法经典与大德开示的智能问答">

    <!-- 预连接 -->

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://media.3333444.xyz" crossorigin>
    <link rel="preconnect" href="https://api.3333444.xyz">
    <link rel="dns-prefetch" href="https://api.3333444.xyz">

    <!-- 预加载关键资源 -->

    <link rel="preload" href="https://media.3333444.xyz/fonts/JingHuaOldSong.ttf" as="font" type="font/truetype"
        crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/marked/marked.min.js" as="script">

    <!-- 异步加载 LXGW WenKai -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" media="print"
        onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
    </noscript>

    <script>
        const API_URL = "https://api.3333444.xyz";
    </script>

    <style>
        @font-face {
            font-family: 'JingHua';
            src: url('https://media.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype');
            font-display: swap;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #faf9f7;
            --bg2: #f2f0ec;
            --bg3: #e8e5df;
            --text: #2c2820;
            --text2: #6b6358;
            --text3: #a09890;
            --border: rgba(44, 40, 32, 0.12);
            --accent: #8b7355;
            --max-w: 720px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1917;
                --bg2: #232220;
                --bg3: #2d2c28;
                --text: #e8e4dc;
                --text2: #a09890;
                --text3: #6b6358;
                --border: rgba(232, 228, 220, 0.1);
                --accent: #c4a878;
            }
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'LXGW WenKai', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .nav {
            max-width: var(--max-w);
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 2rem 1.5rem 1.5rem;
            border-bottom: 0.5px solid var(--border);
        }

        .nav-title {
            font-family: 'JingHua', serif;
            font-size: 22px;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 0.2em;
        }

        .nav-links {
            display: flex;
            gap: 1.2rem;
        }

        .nav-links a {
            font-size: 15px;
            color: var(--text3);
            text-decoration: none;
            letter-spacing: 0.05em;
        }

        .nav-links a:hover {
            color: var(--text2);
        }

        .nav-links a.active {
            color: var(--accent);
        }

        .main {
            max-width: var(--max-w);
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .welcome {
            text-align: center;
            padding: 3rem 0 2rem;
            color: var(--text3);
            font-size: 14px;
            line-height: 2;
        }

        .welcome-icon {
            font-family: 'JingHua', serif;
            font-size: 28px;
            color: var(--accent);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            margin-bottom: 1.5rem;
        }

        .msg-user {
            text-align: right;
        }

        .msg-user .bubble {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 0.6rem 1rem;
            border-radius: 16px 16px 4px 16px;
            max-width: 80%;
            text-align: left;
            font-size: 15px;
        }

        .msg-ai .bubble {
            background: var(--bg2);
            padding: 1.2rem 1.5rem;
            border-radius: 4px 16px 16px 16px;
            border: 0.5px solid var(--border);
            font-size: 15px;
            line-height: 1.9;
        }

        /* 加载动画 */
        .loading-dots {
            color: var(--text3);
            font-size: 14px;
        }

        .loading-dots::after {
            content: '';
            display: inline-block;
            animation: ldots 1.5s steps(4) infinite;
        }

        @keyframes ldots {
            0% {
                content: '';
            }

            25% {
                content: ' ·';
            }

            50% {
                content: ' · ·';
            }

            75% {
                content: ' · · ·';
            }
        }

        /* Markdown 排版 */
        .msg-ai .bubble h3 {
            font-family: 'JingHua', serif;
            font-size: 16px;
            color: var(--accent);
            margin: 1.4rem 0 0.5rem;
            letter-spacing: 0.05em;
            padding-bottom: 0.3rem;
            border-bottom: 0.5px solid var(--border);
        }

        .msg-ai .bubble h3:first-child {
            margin-top: 0;
        }

        .msg-ai .bubble p {
            margin: 0.5rem 0;
        }

        .msg-ai .bubble blockquote {
            border-left: 2px solid var(--accent);
            padding: 0.3rem 0 0.3rem 0.8rem;
            margin: 0.8rem 0;
            color: var(--text2);
            font-size: 14px;
            background: var(--bg);
            border-radius: 0 8px 8px 0;
        }

        .msg-ai .bubble a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 0.5px solid var(--accent);
            word-break: break-all;
        }

        .msg-ai .bubble strong {
            color: var(--accent);
        }

        .msg-ai .bubble ul,
        .msg-ai .bubble ol {
            padding-left: 1.2rem;
            margin: 0.4rem 0;
        }

        .msg-ai .bubble li {
            margin: 0.2rem 0;
        }

        .msg-ai .bubble hr {
            border: none;
            border-top: 0.5px solid var(--border);
            margin: 1rem 0;
        }

        .input-area {
            max-width: var(--max-w);
            width: 100%;
            margin: 0 auto;
            padding: 1rem 1.5rem 1.5rem;
            border-top: 0.5px solid var(--border);
            background: var(--bg);
            position: sticky;
            bottom: 0;
        }

        .input-row {
            display: flex;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            font-family: 'LXGW WenKai', serif;
            font-size: 15px;
            color: var(--text);
            background: var(--bg2);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            padding: 0.7rem 1rem;
            resize: none;
            min-height: 42px;
            max-height: 120px;
            line-height: 1.6;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row textarea:focus {
            border-color: var(--accent);
        }

        .input-row textarea::placeholder {
            color: var(--text3);
        }

        .input-row button {
            font-family: 'LXGW WenKai', serif;
            font-size: 14px;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .input-row button:hover {
            opacity: 0.85;
        }

        .input-row button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .input-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 12px;
            color: var(--text3);
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .examples button {
            font-family: 'LXGW WenKai', serif;
            font-size: 13px;
            color: var(--text2);
            background: var(--bg2);
            border: 0.5px solid var(--border);
            border-radius: 20px;
            padding: 0.4rem 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .examples button:hover {
            background: var(--bg3);
            color: var(--text);
        }

        @media (max-width: 600px) {
            .nav {
                padding: 1.2rem 1rem 1rem;
            }

            .main {
                padding: 0 1rem;
            }

            .input-area {
                padding: 0.8rem 1rem 1rem;
            }

            .msg-ai .bubble {
                padding: 1rem;
            }

            .welcome {
                padding: 2rem 0 1.5rem;
            }
        }
    </style>

</head>

<body>

    <nav class="nav">
        <a href="/" class="nav-title">寂照</a>
        <div class="nav-links">
            <a href="/">文章</a>
            <a href="/chat.html" class="active">问答</a>
            <a href="/about.html">关于</a>
        </div>
    </nav>

    <div class="main">
        <div id="welcome" class="welcome">
            <div class="welcome-icon">问 道</div>
            <div>基于佛法经典与大德开示的智能问答</div>
            <div class="examples">
                <button onclick="askExample(this)">什么是空性</button>
                <button onclick="askExample(this)">心乱时怎么摄心</button>
                <button onclick="askExample(this)">如何理解见性</button>
                <button onclick="askExample(this)">放不下怎么办</button>
            </div>
        </div>
        <div id="messages" class="messages"></div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <textarea id="input" placeholder="请输入佛法修行相关问题..." rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
            <button id="btn" onclick="send()">提问</button>
        </div>
        <div class="input-meta">
            <span id="remaining"></span>
            <span id="status"></span>
        </div>
    </div>

    <!-- marked.js：async + preload 配合，onload 设标志位 -->

    <script async src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
        onload="markedReady=true; marked.setOptions({ breaks: true, gfm: true });"></script>

    <script>
        const DAILY_KEY = "jz_chat_" + new Date().toISOString().slice(0, 10);
        const DAILY_LIMIT = 100;
        let sending = false;
        let markedReady = false;

        // marked 尚未就绪时降级为纯文本换行
        function renderMarkdown(text) {
            if (markedReady && typeof marked !== "undefined") {
                return marked.parse(text);
            }
            return "<p>" + text.replace(/\n/g, "<br>") + "</p>";
        }

        // 等待提示语序列，每 2.2 秒切换一条
        const LOADING_MSGS = [
            "正在查询佛法经典",
            "正在匹配大德开示",
            "正在比对注疏义理",
            "正在准备文本",
            "如如不动，稍候片刻",
        ];

        function init() {
            document.getElementById("remaining").textContent = "";
        }

        function setExhausted() {
            document.getElementById("remaining").textContent = "今日问的蛮多，去实修吧，欢迎明日再来 🙏";
            document.getElementById("btn").disabled = true;
            document.getElementById("input").disabled = true;
        }

        function askExample(btn) {
            document.getElementById("input").value = btn.textContent;
            send();
        }

        function addMsg(role, html) {
            document.getElementById("welcome").style.display = "none";
            const box = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "msg msg-" + role;
            div.innerHTML = '<div class="bubble">' + html + '</div>';
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        function esc(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        async function send() {
            if (sending) return;
            const inp = document.getElementById("input");
            const q = inp.value.trim();
            if (!q) return;

            sending = true;
            inp.value = "";
            inp.style.height = "auto";
            document.getElementById("btn").disabled = true;

            addMsg("user", esc(q));

            // 插入 AI 气泡，显示第一条等待提示
            const aiDiv = addMsg("ai", '<span id="loading-tip" class="loading-dots">' + LOADING_MSGS[0] + '</span>');
            const bubble = aiDiv.querySelector(".bubble");

            // 启动轮换 timer，停在最后一条不再循环
            let loadingIdx = 0;
            const loadingTimer = setInterval(() => {
                loadingIdx++;
                const tip = document.getElementById("loading-tip");
                if (tip) tip.textContent = LOADING_MSGS[Math.min(loadingIdx, LOADING_MSGS.length - 1)];
                if (loadingIdx >= LOADING_MSGS.length - 1) clearInterval(loadingTimer);
            }, 2200);

            try {
                const resp = await fetch(API_URL + "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: q }),
                });

                // JSON 错误（限流等）
                const ct = resp.headers.get("content-type") || "";
                if (ct.includes("application/json")) {
                    const data = await resp.json();
                    if (data.error) {
                        clearInterval(loadingTimer);
                        bubble.innerHTML = '<p style="color:var(--text3)">' + data.error + '</p>';
                        if (data.remaining === 0) setExhausted();
                        sending = false;
                        document.getElementById("btn").disabled = false;
                        return;
                    }
                }

                // ── 流式读取 ──
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let full = "";
                let firstChunk = true;
                let graphUrl = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value, { stream: true });
                    for (const line of text.split("\n")) {
                        if (!line.startsWith("data: ")) continue;
                        const payload = line.slice(6).trim();
                        if (payload === "[DONE]") continue;
                        try {
                            const obj = JSON.parse(payload);
                            // 接收图谱 URL（meta 事件）
                            if (obj.meta && obj.meta.graph_url) {
                                graphUrl = obj.meta.graph_url;
                                continue;
                            }
                            if (obj.error) {
                                bubble.innerHTML += '<p style="color:var(--text3)">⚠️ ' + obj.error + '</p>';
                                continue;
                            }
                            const delta = obj.choices && obj.choices[0] && obj.choices[0].delta && obj.choices[0].delta.content;
                            if (delta) {
                                if (firstChunk) {
                                    clearInterval(loadingTimer); // 收到正文，立即停止轮换
                                    bubble.innerHTML = "";
                                    firstChunk = false;
                                }
                                full += delta;
                                bubble.innerHTML = renderMarkdown(full);
                                document.getElementById("messages").scrollTop =
                                    document.getElementById("messages").scrollHeight;
                            }
                        } catch (e) { }
                    }
                }

                if (full) {
                    let html = renderMarkdown(full);
                    if (graphUrl) {
                        html += '<div style="margin-top:1rem;border-top:0.5px solid var(--border);padding-top:1rem">'
                            + '<img src="' + graphUrl + '" alt="义理关系图" style="width:100%;border-radius:8px;cursor:pointer" '
                            + 'onclick="window.open(this.src)" loading="lazy">'
                            + '<p style="font-size:12px;color:var(--text3);margin-top:0.3rem;text-align:center">义理关系图（点击放大）</p></div>';
                    }
                    bubble.innerHTML = html;
                }
                if (!full && firstChunk) {
                    clearInterval(loadingTimer);
                    bubble.innerHTML = '<p style="color:var(--text3)">未收到回答，请重试</p>';
                }

                // 成功后异步写入 QA 向量库
                if (full) {
                    fetch(API_URL + "/index/qa", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ question: q, answer: full.slice(0, 1500), source: "chat" }),
                    }).catch(function () { });
                }

            } catch (err) {
                clearInterval(loadingTimer); // 出错也要清除 timer
                bubble.innerHTML = '<p style="color:var(--text3)">连接失败，请稍后重试</p>';
            }

            sending = false;
            document.getElementById("btn").disabled = false;
            document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
        }

        document.getElementById("input").addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        init();
    </script>

</body>

</html>
