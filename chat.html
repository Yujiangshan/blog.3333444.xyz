<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>问答 · 寂照</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
<style>
    @font-face { font-family: 'JingHua'; src: url('https://blog.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype'); font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7; --bg2: #f2f0ec; --bg3: #e8e5df;
      --text: #2c2820; --text2: #6b6358; --text3: #a09890;
      --border: rgba(44,40,32,0.12); --accent: #8b7355; --max-w: 720px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917; --bg2: #232220; --bg3: #2d2c28;
        --text: #e8e4dc; --text2: #a09890; --text3: #6b6358;
        --border: rgba(232,228,220,0.1); --accent: #c4a878;
      }
    }
    body { font-family: 'LXGW WenKai', sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; }
    .wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    .nav { display: flex; justify-content: space-between; align-items: baseline; padding: 2.5rem 0 1.5rem; border-bottom: 0.5px solid var(--border); }
    .nav-title { font-family: 'JingHua', serif; font-size: 24px; color: var(--text); text-decoration: none; letter-spacing: 0.2em; }
    textarea { flex: 1; font-family: inherit; font-size: 15px; background: var(--bg2); color: var(--text); border: 0.5px solid var(--border); border-radius: 14px; padding: 0.8rem 1.2rem; resize: none; outline: none; }
    .text-scroll-up { display: inline-block; animation: scrollUp 0.6s ease-out; }
    @keyframes scrollUp { 0%% { transform: translateY(8px); opacity: 0; } 100%% { transform: translateY(0); opacity: 1; } }
    @keyframes text-breath { 0%%, 100%% { opacity: 0.6; } 50%% { opacity: 1; } }
    </style>
</head>
<body>
<div class="wrap" style="flex:1; display:flex; flex-direction:column; height: 100vh;">
  <nav class="nav"><a href="/" class="nav-title">寂照</a></nav>
  <div id="messages" style="flex:1; overflow-y:auto; padding:1.5rem 0;"></div>
  <div style="padding:1rem 0 2rem; border-top:0.5px solid var(--border);">
    <div style="display:flex; gap:0.8rem;">
      <textarea id="input" placeholder="请输入问题..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button onclick="send()" style="background:var(--accent); color:#fff; border:none; border-radius:12px; padding:0 1.2rem;">提问</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let sending = false;
async function send() {
  if (sending) return;
  const q = document.getElementById("input").value.trim(); if(!q) return;
  sending = true; document.getElementById("input").value = "";
  
  const msgBox = document.getElementById("messages");
  const aiDiv = document.createElement("div");
  aiDiv.innerHTML = '<div style="background:var(--bg2);padding:1rem;border-radius:12px;"><span id="st" class="text-scroll-up">正在开启经藏索引...</span></div>';
  msgBox.appendChild(aiDiv);
  
  const statusEl = document.getElementById("st");
  const msgs = ["正在翻阅大藏经...", "正在检索大德开示...", "正在感悟义理...", "正在梳理逻辑...", "正在凝练文义...", "即将呈送回答..."];
  let idx = 0;
  const timer = setInterval(() => {
    idx++;
    if(idx < msgs.length) {
      statusEl.innerText = msgs[idx];
      statusEl.classList.remove('text-scroll-up');
      void statusEl.offsetWidth;
      statusEl.classList.add('text-scroll-up');
    } else { statusEl.style.animation = "text-breath 2s infinite"; }
  }, 3000);

  try {
    const resp = await fetch("https://api.3333444.xyz/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q })
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = "", first = true;
    while(true) {
      const {done, value} = await reader.read(); if(done) break;
      const text = decoder.decode(value);
      for(const line of text.split("\n")) {
        if(line.startsWith("data: ")) {
          const payload = line.slice(6);
          if(payload.trim() === "[DONE]") continue;
          try {
            const obj = JSON.parse(payload);
            const delta = obj.choices?.[0]?.delta?.content;
            if(delta) {
              if(first) { clearInterval(timer); aiDiv.querySelector("div").innerHTML = ""; first = false; }
              full += delta; aiDiv.querySelector("div").innerHTML = marked.parse(full);
              msgBox.scrollTop = msgBox.scrollHeight;
            }
          } catch(e) {}
        }
      }
    }
  } catch(e) { clearInterval(timer); }
  sending = false;
}
</script>
</body></html>
