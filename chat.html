<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>问答 · 寂照</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
<script>const API_URL = "https://api.3333444.xyz"; const SHOW_GRAPH = true;</script>
<style>
    @font-face { font-family: 'JingHua'; src: url('https://blog.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype'); font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7; --bg2: #f2f0ec; --bg3: #e8e5df;
      --text: #2c2820; --text2: #6b6358; --text3: #a09890;
      --border: rgba(44,40,32,0.12); --accent: #8b7355; --max-w: 720px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917; --bg2: #232220; --bg3: #2d2c28;
        --text: #e8e4dc; --text2: #a09890; --text3: #6b6358;
        --border: rgba(232,228,220,0.1); --accent: #c4a878;
      }
    }
    html, body { height: 100%%; font-family: 'LXGW WenKai', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    
    .app-container { display: flex; flex-direction: column; height: 100vh; max-width: var(--max-w); margin: 0 auto; padding: 0 1.2rem; }
    
    .nav { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: baseline; padding: 2rem 0 1rem; border-bottom: 0.5px solid var(--border); }
    .nav-title { font-family: 'JingHua', serif; font-size: 24px; color: var(--text); text-decoration: none; letter-spacing: 0.2em; }
    .nav-links a { font-size: 15px; color: var(--text3); text-decoration: none; margin-left: 1.2rem; }
    .nav-links a.active { color: var(--accent); }

    #messages { flex: 1; overflow-y: auto; padding: 1.5rem 0; -webkit-overflow-scrolling: touch; }
    
    .input-area { flex: 0 0 auto; padding: 1rem 0 2rem; border-top: 0.5px solid var(--border); background: var(--bg); }
    .input-row { display: flex; gap: 0.6rem; align-items: flex-end; }
    
    textarea { 
      flex: 1; font-family: inherit; font-size: 16px; background: var(--bg2); color: var(--text) !important; 
      caret-color: var(--accent); border: 0.5px solid var(--border); border-radius: 12px; 
      padding: 0.7rem 1rem; resize: none; outline: none; border-color: transparent;
    }
    textarea:focus { border-color: var(--accent); }
    
    button { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0.6rem 1.2rem; cursor: pointer; font-size: 15px; }

    /* 加载动画 */
    .loading-box { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 14px; margin-top: 0.5rem; }
    .lotus-loader {
      width: 22px; height: 22px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%%23e6b422"><path d="M12 22s-2.9-4-5-6c-2.1-2-4-3.1-4-5.5a3.5 3.5 0 0 1 7 0c0 .3.1.5.1.7l1.9 2.8 1.9-2.8c0-.2.1-.4.1-.7a3.5 3.5 0 0 1 7 0c0 2.4-1.9 3.5-4 5.5-2.1 2-5 6-5 6zM12 12a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" /></svg>');
      background-size: contain; filter: drop-shadow(0 0 8px rgba(230, 180, 34, 0.7));
      animation: lotus-sway 2.5s ease-in-out infinite;
    }
    .breath-text { animation: text-breath 2s infinite; }
    @keyframes lotus-sway { 0%%, 100%% { transform: translateY(0); } 50%% { transform: translateY(-5px); } }
    @keyframes text-breath { 0%%, 100%% { opacity: 0.4; } 50%% { opacity: 1; } }
    </style>
</head>
<body>
<div class="app-container">
  <nav class="nav">
    <a href="/" class="nav-title">寂照</a>
    <div class="nav-links"><a href="/">文章</a><a href="/chat.html" class="active">问答</a></div>
  </nav>

  <div id="messages">
    <div id="welcome" style="text-align:center; padding:4rem 0; color:var(--text3);">
      <div style="font-family:'JingHua'; font-size:32px; color:var(--accent); margin-bottom:1rem; letter-spacing:0.1em;">问 道</div>
      <p style="font-size:14px;">基于佛法经典与大德开示的智能问答</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="请输入您的问题..." rows="1" 
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
      <button id="btn" onclick="send()">提问</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let sending = false;
marked.setOptions({ breaks: true, gfm: true });

function appendMsg(role, content) {
    const msgBox = document.getElementById("messages");
    const welcome = document.getElementById("welcome"); if(welcome) welcome.remove();
    
    const div = document.createElement("div");
    div.style.marginBottom = "1.5rem";
    if(role === 'user') {
        div.style.textAlign = "right";
        div.innerHTML = `<div style="display:inline-block; background:var(--accent); color:#fff; padding:0.7rem 1.1rem; border-radius:18px 18px 4px 18px; text-align:left; font-size:15px;">${content}</div>`;
    } else {
        div.innerHTML = `<div class="bubble" style="background:var(--bg2); padding:1.2rem 1.4rem; border-radius:4px 18px 18px 18px; border:0.5px solid var(--border); line-height:1.9;">${content}</div>`;
    }
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
    return div;
}

async function send() {
  const inp = document.getElementById("input");
  const q = inp.value.trim();
  if (!q || sending) return;
  
  sending = true;
  inp.value = "";
  appendMsg('user', q.replace(/&/g,"&amp;").replace(/</g,"&lt;"));
  
  const aiDiv = appendMsg('ai', `<div class="loading-box"><div class="lotus-loader"></div><span id="status-text">正在检索经藏义理</span></div>`);
  const bubble = aiDiv.querySelector(".bubble");
  const statusEl = aiDiv.querySelector("#status-text");

  const msgs = ["正在检索经藏义理...", "正在梳理大德开示...", "正在凝练微言大义..."];
  let msgIdx = 0;
  const timer = setInterval(() => {
    msgIdx = (msgIdx + 1) %% msgs.length;
    if(statusEl) statusEl.innerText = msgs[msgIdx];
  }, 2000);

  try {
    const resp = await fetch(API_URL + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q }),
    });
    
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = "", first = true, graphUrl = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const text = decoder.decode(value);
      const lines = text.split("\n");
      
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") continue;
        try {
          const obj = JSON.parse(payload);
          if (SHOW_GRAPH && obj.meta?.graph_url) { graphUrl = obj.meta.graph_url; continue; }
          const delta = obj.choices?.[0]?.delta?.content;
          if (delta) {
            if (first) { clearInterval(timer); bubble.innerHTML = ""; first = false; }
            full += delta;
            bubble.innerHTML = marked.parse(full);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
          }
        } catch(e) {}
      }
    }
    if (SHOW_GRAPH && graphUrl) {
      bubble.innerHTML += `<div style="margin-top:1.2rem;border-top:0.5px solid var(--border);padding-top:1rem"><img src="${graphUrl}" style="width:100%%;border-radius:10px;border:0.5px solid var(--border);"><p style="font-size:12px;color:var(--text3);text-align:center;margin-top:0.5rem">义理关系图</p></div>`;
    }
  } catch(err) {
    clearInterval(timer);
    bubble.innerHTML = "请求失败，请稍后重试";
  } finally {
    sending = false;
  }
}
</script>
</body></html>
