<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问答 · 寂照</title>
<meta name="description" content="寂照 — 佛法修行问答，基于个人笔记与经典的智能问答">
<script>
// ⬇️ 修改这里为你的 API 地址（Cloudflare Tunnel 或 nginx 反代后的公网地址）
const API_URL = "https://api.3333444.xyz";
</script>
<style>
@font-face {
  font-family: 'JingHua';
  src: url('https://media.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype');
  font-display: swap;
}
@import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf9f7;
  --bg2: #f2f0ec;
  --bg3: #e8e5df;
  --text: #2c2820;
  --text2: #6b6358;
  --text3: #a09890;
  --border: rgba(44,40,32,0.12);
  --accent: #8b7355;
  --max-w: 720px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1917;
    --bg2: #232220;
    --bg3: #2d2c28;
    --text: #e8e4dc;
    --text2: #a09890;
    --text3: #6b6358;
    --border: rgba(232,228,220,0.1);
    --accent: #c4a878;
  }
}

html { font-size: 16px; }
body {
  font-family: 'LXGW WenKai', 'PingFang SC', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 导航 */
.nav {
  max-width: var(--max-w);
  width: 100%;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 2rem 1.5rem 1.5rem;
  border-bottom: 0.5px solid var(--border);
}
.nav-title {
  font-family: 'JingHua', serif;
  font-size: 22px;
  color: var(--text);
  text-decoration: none;
  letter-spacing: 0.2em;
}
.nav-links { display: flex; gap: 1.2rem; }
.nav-links a {
  font-size: 15px;
  color: var(--text3);
  text-decoration: none;
  letter-spacing: 0.05em;
}
.nav-links a:hover { color: var(--text2); }
.nav-links a.active { color: var(--accent); }

/* 主区域 */
.main {
  max-width: var(--max-w);
  width: 100%;
  margin: 0 auto;
  padding: 0 1.5rem;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* 欢迎语 */
.welcome {
  text-align: center;
  padding: 3rem 0 2rem;
  color: var(--text3);
  font-size: 14px;
  line-height: 2;
}
.welcome-icon {
  font-family: 'JingHua', serif;
  font-size: 28px;
  color: var(--accent);
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
}

/* 消息列表 */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0;
}

.msg {
  margin-bottom: 1.5rem;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-user {
  text-align: right;
}
.msg-user .msg-bubble {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  padding: 0.6rem 1rem;
  border-radius: 16px 16px 4px 16px;
  max-width: 80%;
  text-align: left;
  font-size: 15px;
}

.msg-ai .msg-bubble {
  background: var(--bg2);
  padding: 1.2rem 1.5rem;
  border-radius: 4px 16px 16px 16px;
  border: 0.5px solid var(--border);
  font-size: 15px;
  line-height: 1.9;
}

/* AI 回复中的 Markdown */
.msg-ai .msg-bubble h3 {
  font-family: 'JingHua', serif;
  font-size: 16px;
  color: var(--accent);
  margin: 1.2rem 0 0.4rem;
  letter-spacing: 0.05em;
}
.msg-ai .msg-bubble h3:first-child { margin-top: 0; }

.msg-ai .msg-bubble p { margin: 0.4rem 0; }

.msg-ai .msg-bubble blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 0.8rem;
  margin: 0.6rem 0;
  color: var(--text2);
  font-size: 14px;
}

.msg-ai .msg-bubble a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 0.5px solid var(--accent);
}

.msg-ai .msg-bubble strong { color: var(--accent); }

/* 打字指示器 */
.typing {
  display: inline-block;
  color: var(--text3);
  font-size: 14px;
}
.typing::after {
  content: '';
  animation: dots 1.2s steps(4) infinite;
}
@keyframes dots {
  0% { content: ''; }
  25% { content: '·'; }
  50% { content: '··'; }
  75% { content: '···'; }
}

/* 输入区 */
.input-area {
  max-width: var(--max-w);
  width: 100%;
  margin: 0 auto;
  padding: 1rem 1.5rem 1.5rem;
  border-top: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  bottom: 0;
}

.input-row {
  display: flex;
  gap: 0.8rem;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  font-family: 'LXGW WenKai', serif;
  font-size: 15px;
  color: var(--text);
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 0.7rem 1rem;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  line-height: 1.6;
  outline: none;
  transition: border-color 0.2s;
}
.input-row textarea:focus {
  border-color: var(--accent);
}
.input-row textarea::placeholder { color: var(--text3); }

.input-row button {
  font-family: 'LXGW WenKai', serif;
  font-size: 14px;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 0.6rem 1.2rem;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.input-row button:hover { opacity: 0.85; }
.input-row button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.input-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.5rem;
  font-size: 12px;
  color: var(--text3);
}

/* 示例问题 */
.examples {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1rem;
}
.examples button {
  font-family: 'LXGW WenKai', serif;
  font-size: 13px;
  color: var(--text2);
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.examples button:hover {
  background: var(--bg3);
  color: var(--text);
}

/* 移动端 */
@media (max-width: 600px) {
  .nav { padding: 1.2rem 1rem 1rem; }
  .main { padding: 0 1rem; }
  .input-area { padding: 0.8rem 1rem 1rem; }
  .msg-ai .msg-bubble { padding: 1rem; }
  .welcome { padding: 2rem 0 1.5rem; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-title">寂照</a>
  <div class="nav-links">
    <a href="/">文章</a>
    <a href="/chat.html" class="active">问答</a>
    <a href="/about.html">关于</a>
  </div>
</nav>

<div class="main">
  <div id="welcome" class="welcome">
    <div class="welcome-icon">问 道</div>
    <div>基于个人修行笔记与佛法经典的智能问答</div>
    <div>每日可免费提问 <span id="limit-display">3</span> 次</div>
    <div class="examples">
      <button onclick="askExample(this)">什么是空性</button>
      <button onclick="askExample(this)">心乱时怎么摄心</button>
      <button onclick="askExample(this)">如何理解见性</button>
      <button onclick="askExample(this)">放不下怎么办</button>
    </div>
  </div>

  <div id="messages" class="messages"></div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="请输入佛法修行相关问题..." rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="btn" onclick="send()">提问</button>
  </div>
  <div class="input-meta">
    <span id="remaining"></span>
    <span id="status"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const DAILY_KEY = "jz_chat_" + new Date().toISOString().slice(0, 10);
let sending = false;

// 初始化
function init() {
  const used = parseInt(localStorage.getItem(DAILY_KEY) || "0");
  const total = parseInt(document.getElementById("limit-display").textContent);
  updateRemaining(total - used);
}

function updateRemaining(n) {
  const el = document.getElementById("remaining");
  if (n <= 0) {
    el.textContent = "今日次数已用完，明日再来 🙏";
    document.getElementById("btn").disabled = true;
    document.getElementById("input").disabled = true;
  } else {
    el.textContent = `今日剩余 ${n} 次`;
  }
}

function askExample(btn) {
  document.getElementById("input").value = btn.textContent;
  send();
}

function addMsg(role, html) {
  const el = document.getElementById("messages");
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.style.display = "none";

  const div = document.createElement("div");
  div.className = `msg msg-${role}`;
  div.innerHTML = `<div class="msg-bubble">${html}</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return div;
}

async function send() {
  if (sending) return;
  const input = document.getElementById("input");
  const query = input.value.trim();
  if (!query) return;

  // 本地计数检查
  const used = parseInt(localStorage.getItem(DAILY_KEY) || "0");
  const limit = parseInt(document.getElementById("limit-display").textContent);
  if (used >= limit) {
    updateRemaining(0);
    return;
  }

  sending = true;
  input.value = "";
  document.getElementById("btn").disabled = true;
  document.getElementById("status").textContent = "";

  // 显示用户消息
  addMsg("user", escapeHtml(query));

  // 显示加载指示
  const aiMsg = addMsg("ai", '<span class="typing">正在检索笔记</span>');
  const bubble = aiMsg.querySelector(".msg-bubble");

  try {
    const resp = await fetch(`${API_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query }),
    });

    // 限流错误
    if (resp.headers.get("content-type")?.includes("application/json")) {
      const data = await resp.json();
      if (data.error) {
        bubble.innerHTML = `<p style="color:var(--text3)">${data.error}</p>`;
        sending = false;
        document.getElementById("btn").disabled = false;
        if (data.remaining === 0) updateRemaining(0);
        return;
      }
    }

    // 记录使用
    localStorage.setItem(DAILY_KEY, String(used + 1));
    updateRemaining(limit - used - 1);

    // 流式读取 SSE
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    bubble.innerHTML = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") continue;

        try {
          const parsed = JSON.parse(payload);
          if (parsed.error) {
            bubble.innerHTML += `<p style="color:var(--text3)">⚠️ ${parsed.error}</p>`;
            continue;
          }
          const delta = parsed.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            bubble.innerHTML = marked.parse(fullText);
            document.getElementById("messages").scrollTop =
              document.getElementById("messages").scrollHeight;
          }
        } catch (e) {
          // 忽略解析错误
        }
      }
    }

    // 最终渲染
    if (fullText) {
      bubble.innerHTML = marked.parse(fullText);
    }

  } catch (err) {
    bubble.innerHTML = `<p style="color:var(--text3)">连接失败，请稍后重试</p>`;
    console.error(err);
  }

  sending = false;
  document.getElementById("btn").disabled = false;
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")
          .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// textarea 自动高度
document.getElementById("input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

init();
</script>
</body>
</html>
