<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>问答 · 寂照</title>

<link rel="preconnect" href="https://api.3333444.xyz" crossorigin>
<link rel="dns-prefetch" href="https://api.3333444.xyz">
<script>
  function __prewarmAPI() {
    fetch("https://api.3333444.xyz/chat", { method: "OPTIONS", mode: "no-cors" }).catch(() => {});
  }
  if (window.requestIdleCallback) {
    requestIdleCallback(() => __prewarmAPI());
  } else {
    setTimeout(__prewarmAPI, 1200);
  }
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
<script>const API_URL = "https://api.3333444.xyz"; const SHOW_GRAPH = true;</script>
<style>

    @font-face { font-family: 'JingHua'; src: url('https://blog.3333444.xyz/fonts/JingHuaOldSong.ttf') format('truetype'); font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7; --bg2: #f2f0ec; --bg3: #e8e5df;
      --text: #2c2820; --text2: #6b6358; --text3: #a09890;
      --border: rgba(44,40,32,0.12); --accent: #8b7355; --max-w: 720px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917; --bg2: #232220; --bg3: #2d2c28;
        --text: #e8e4dc; --text2: #a09890; --text3: #6b6358;
        --border: rgba(232,228,220,0.1); --accent: #c4a878;
      }
    }
    html { font-size: 16px; }
    body {
      font-family: 'LXGW WenKai', 'PingFang SC', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.8;
    }
    .wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    .nav { display: flex; justify-content: space-between; align-items: baseline; padding: 2.5rem 0 1.5rem; border-bottom: 0.5px solid var(--border); }
    .nav-title { font-family: 'JingHua', serif; font-size: 24px; color: var(--text); text-decoration: none; letter-spacing: 0.2em; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { font-size: 16px; color: var(--text3); text-decoration: none; }
    .nav-links a.active { color: var(--accent); }

    /* Textarea 修复版样式 */
    textarea { 
      flex: 1; font-family: inherit; font-size: 15px; 
      background: var(--bg2); 
      color: var(--text); /* 显式跟随主题文字颜色 */
      caret-color: var(--accent); /* 光标颜色 */
      border: 0.5px solid var(--border); border-radius: 14px; 
      padding: 0.8rem 1.2rem; resize: none; outline: none; transition: border-color 0.3s; 
    }
    textarea:focus { border-color: var(--accent); }

    /* **新增：禅意加载动画 CSS** */
    .loading-box {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text3);
      font-size: 14px;
    }
    /* 莲花微动动画 */
    .lotus-loader {
      width: 20px; height: 20px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%%23c4a878"><path d="M12 22s-2.9-4-5-6c-2.1-2-4-3.1-4-5.5a3.5 3.5 0 0 1 7 0c0 .3.1.5.1.7l1.9 2.8 1.9-2.8c0-.2.1-.4.1-.7a3.5 3.5 0 0 1 7 0c0 2.4-1.9 3.5-4 5.5-2.1 2-5 6-5 6zM12 12a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" /></svg>');
      background-size: contain;
      background-repeat: no-repeat;
      animation: lotus-sway 2.5s ease-in-out infinite;
      opacity: 0.7;
    }
    /* 文字呼吸隐现动画 */
    .breath-text {
      animation: text-breath 2.5s ease-in-out infinite;
      letter-spacing: 0.05em;
    }
    @keyframes lotus-sway {
      0%%%%, 100%%%% { transform: translateY(0) rotate(-2deg); }
      50%%%% { transform: translateY(-3px) rotate(2deg); }
    }
    @keyframes text-breath {
      0%%%%, 100%%%% { opacity: 0.5; }
      50%%%% { opacity: 1; }
    }
    
body { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-top: 1rem; }
.welcome { text-align: center; padding: 4rem 0; color: var(--text3); font-size: 14px; }
.welcome-icon { font-family: 'JingHua', serif; font-size: 32px; color: var(--accent); margin-bottom: 0.8rem; letter-spacing: 0.1em; }
.messages { flex: 1; overflow-y: auto; padding: 1rem 0; -webkit-overflow-scrolling: touch; }
.msg { margin-bottom: 1.8rem; }
.msg-user { text-align: right; }
.msg-user .bubble { display: inline-block; background: var(--accent); color: #fff; padding: 0.7rem 1.2rem; border-radius: 18px 18px 4px 18px; text-align: left; font-size: 15px; }
.msg-ai .bubble { background: var(--bg2); padding: 1.2rem 1.5rem; border-radius: 4px 18px 18px 18px; border: 0.5px solid var(--border); font-size: 15px; line-height: 1.9; }
.input-area { padding: 1rem 0 2rem; border-top: 0.5px solid var(--border); background: var(--bg); position: sticky; bottom: 0; }
.input-row { display: flex; gap: 0.8rem; align-items: flex-end; }
button { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 0.7rem 1.4rem; cursor: pointer; font-size: 15px; }
.examples { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; margin-top: 1.5rem; }
.examples button { font-size: 13px; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 0.45rem 1rem; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap" style="flex:1; display:flex; flex-direction:column;">
<nav class="nav"><a href="/" class="nav-title">寂照</a><div class="nav-links"><a href="/">文章</a><a href="/chat.html" class="active">问答</a><a href="/about.html">关于</a></div></nav>
<div class="main">
  <div id="welcome" class="welcome">
    <div class="welcome-icon">问 道</div>
    <div style="margin-bottom:2rem;">基于佛法经典与大德开示的智能问答</div>
    <div class="examples">
      <button onclick="askExample(this)">什么是空性</button>
      <button onclick="askExample(this)">心乱时怎么摄心</button>
      <button onclick="askExample(this)">如何理解见性</button>
    </div>
  </div>
  <div id="messages" class="messages"></div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="请输入问题..." rows="1" onfocus="__prewarmAPI()"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="btn" onclick="send()">提问</button>
  </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let sending = false;
marked.setOptions({ breaks: true, gfm: true });
function askExample(btn) { document.getElementById("input").value = btn.textContent; send(); }
function addMsg(role, html) {
  document.getElementById("welcome").style.display = "none";
  const box = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg msg-" + role;
  div.innerHTML = '<div class="bubble">' + html + '</div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}
async function send() {
  if (sending) return;
  const inp = document.getElementById("input");
  const q = inp.value.trim(); if (!q) return;
  sending = true; inp.value = ""; document.getElementById("btn").disabled = true;
  addMsg("user", q.replace(/&/g,"&amp;").replace(/</g,"&lt;"));
  
  // **更新：JS 逻辑调用全新禅意加载动画结构**
  const aiDiv = addMsg("ai", '<div class="loading-box"><div class="lotus-loader"></div><span class="breath-text">正在检索义理，请稍候</span></div>');
  const bubble = aiDiv.querySelector(".bubble");
  
  try {
    const resp = await fetch(API_URL + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = "", first = true, graphUrl = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const text = decoder.decode(value, { stream: true });
      for (const line of text.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") continue;
        try {
          const obj = JSON.parse(payload);
          if (SHOW_GRAPH && obj.meta?.graph_url) { graphUrl = obj.meta.graph_url; continue; }
          const delta = obj.choices?.[0]?.delta?.content;
          if (delta) {
            if (first) { bubble.innerHTML = ""; first = false; }
            full += delta; bubble.innerHTML = marked.parse(full);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
          }
        } catch(e) {}
      }
    }
    if (SHOW_GRAPH && graphUrl) {
      bubble.innerHTML += `<div style="margin-top:1.5rem;border-top:0.5px solid var(--border);padding-top:1rem"><img src="${graphUrl}" style="width:100%%;border-radius:10px;cursor:pointer;border:0.5px solid var(--border)" onclick="window.open(this.src)"><p style="font-size:12px;color:var(--text3);text-align:center;margin-top:0.5rem">义理关系图</p></div>`;
    }
  } catch(err) { bubble.innerHTML = "网络不稳定，请重试"; }
  sending = false; document.getElementById("btn").disabled = false;
}
</script>
</body></html>
