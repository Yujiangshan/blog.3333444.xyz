    <article><header style="text-align:center; margin-bottom:3rem;"><h1 style="font-family:JingHua; font-weight:normal;">你还没修到忍无可忍</h1><div style="color:var(--text3);">2026 · 04 · 18</div></header>
    <img src="https://media.3333444.xyz/buddhism_review/xhs/受了委屈_送你这句话_2026-04-18_cover.jpg" alt="你还没修到忍无可忍" style="width:100%;max-width:720px;border-radius:8px;margin-bottom:2rem;display:block;" />
    <div class="article-body"><p>还没做几件事，你就觉得委屈。</p><h2>苦的根源</h2><p>遇到逆境就想逃。因为你执着于一个受委屈的“我”。《成佛之道》：忍是意志坚定。你把空幻的言辞当成实有。心随境转，当然会觉得重。</p><h2>三步用功</h2><p>1.遇到恶意时修安忍。怜悯对方被烦恼控制。2.面对辛苦时磨炼心志。冷热饥渴都是在练心。3.观察辱骂的本质。它们只是缘生的空话。听而不闻，瞋恚自然无从生起。</p><h2>真实的转化</h2><p>听到恶言，心里不起波浪。像父母对待哭闹的孩子。不仅不气，还能生起慈悲。这就是初步的功夫。最高境界是无住生心，离相而行。心如虚空，万物无碍。</p></div></article>
